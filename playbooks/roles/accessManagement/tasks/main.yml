- name: Create custom role for Project and Template management
  ansible.platform.role_definition:
    name: "Project and Template Creator"
    description: "Allows user to create projects, templates, and execute them."
    content_type: awx.organization
    permissions:
      - awx.add_project
      - awx.add_jobtemplate
      - awx.view_organization
      - awx.change_project
      - awx.view_project
    state: present
    aap_hostname: "{{ aap_hostname }}"
    aap_username: "{{ aap_username }}"
    aap_password: "{{ aap_password }}"

- name: Get organization ID via API
  ansible.builtin.uri:
    url: "https://{{ aap_hostname }}/api/v2/organizations/?name={{ org_name | urlencode }}"
    method: GET
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false          # Set to true in production
    return_content: true
    status_code: 200
  register: org_lookup

- name: Fail if organization not found
  ansible.builtin.fail:
    msg: "Organization '{{ org_name }}' not found in AAP."
  when: org_lookup.json.count == 0

- name: Assign custom role to user
  ansible.platform.role_user_assignment:
    user: "target_username"
    role_definition: "Project and Template Creator"
    object_id: "{{ org_lookup.json.results[0].id }}"
    state: present
    aap_hostname: "{{ aap_hostname }}"
    aap_username: "{{ aap_username }}"
    aap_password: "{{ aap_password }}"