- name: Get aap user UID
  command: id -u aap
  register: aap_uid
  changed_when: false

- name: Run AAP containerized backup
  shell: |
    ansible-playbook -i inventory ansible.containerized_installer.backup
  args:
    chdir: /home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-1.1-x86_64
  become_user: aap
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ aap_uid.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ aap_uid.stdout }}/bus"

- name: Create backup directory for additional files
  file:
    path: /home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-1.1-x86_64/backups/additional
    state: directory
    owner: aap
    group: aap
    mode: '0750'

- name: Backup inventory file
  copy:
    src: /home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-1.1-x86_64/inventory
    dest: /home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-1.1-x86_64/backups/additional/inventory
    remote_src: true
    owner: aap
    group: aap
    mode: '0640'

- name: Backup vault file
  copy:
    src: /home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-1.1-x86_64/group_vars/all/vault.yml
    dest: /home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-1.1-x86_64/backups/additional/vault.yml
    remote_src: true
    owner: aap
    group: aap
    mode: '0640'

- name: Backup SSL certificates and key
  copy:
    src: "{{ item }}"
    dest: /home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-1.1-x86_64/backups/additional/
    remote_src: true
    owner: aap
    group: aap
    mode: '0640'
  loop:
    - /home/aap/ssl/ansible.homelab.com.crt
    - /home/aap/ssl/ansible.homelab.com.key
    - /home/aap/ssl/root_ca.crt