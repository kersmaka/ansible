- name: Check available disk space before backup
  assert:
    that:
      - ansible_mounts | selectattr('mount', 'equalto', '/')
          | map(attribute='size_available') | first > 10737418240
    fail_msg: "Less than 10GB free on / — aborting backup to avoid partial run"

- name: Get aap user UID
  command: id -u aap
  register: aap_uid
  changed_when: false

- name: Backup block
  become: true
  block:
    - name: Write vault password to temp file
      copy:
        content: "{{ vault_password }}"
        dest: /home/aap/.vault_pass
        owner: aap
        group: aap
        mode: '0600'
      no_log: true

    - name: Run AAP containerized backup
      shell: |
        ansible-playbook -i inventory ansible.containerized_installer.backup \
          --vault-password-file /home/aap/.vault_pass
      args:
        chdir: "{{ aap_bundle_path | default('/home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-1.1-x86_64') }}"
      become_user: aap
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ aap_uid.stdout }}"
        DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ aap_uid.stdout }}/bus"

    - name: Find manifest zip file
      find:
        paths: /home/aap
        patterns: "manifest_*.zip"
      register: manifest_file

    - name: Fail if no manifest file found
      fail:
        msg: "No manifest_*.zip found in /home/aap — cannot create DR tarball"
      when: manifest_file.files | length == 0

    - name: Create DR tarball containing all backup artifacts
      shell: |
        tar -czf /home/aap/ansibleDR.tar.gz \
          -C {{ aap_bundle_path | default('/home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-1.1-x86_64') }} \
            backups \
            inventory \
            group_vars \
          -C /home/aap \
            ssl \
            {{ manifest_file.files[0].path | basename }}
      args:
        chdir: /home/aap
      become_user: aap
      changed_when: true

  always:
    - name: Remove vault password temp file
      file:
        path: /home/aap/.vault_pass
        state: absent
      no_log: true