- name: Get aap user UID
  command: id -u aap
  register: aap_uid
  changed_when: false

- name: Write vault password to temp file
  copy:
    content: "{{ vault_password }}"
    dest: /home/aap/.vault_pass
    owner: aap
    group: aap
    mode: '0600'
  no_log: true

- name: Run AAP containerized backup
  shell: |
    ansible-playbook -i inventory ansible.containerized_installer.backup \
      --vault-password-file /home/aap/.vault_pass
  args:
    chdir: /home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-1.1-x86_64
  become_user: aap
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ aap_uid.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ aap_uid.stdout }}/bus"

- name: Remove vault password temp file
  file:
    path: /home/aap/.vault_pass
    state: absent
  no_log: true