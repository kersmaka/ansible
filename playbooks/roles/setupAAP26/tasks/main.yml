---
# 1. System Requirements & User Setup
- name: Install system dependencies for rootless podman and firewall
  ansible.builtin.dnf:
    name:
      - ansible-core
      - python3-firewall
    state: present

- name: Create the aap user
  ansible.builtin.user:
    name: aap
    password: "{{ 'redhat' | password_hash('sha512') }}"
    groups: wheel
    generate_ssh_key: yes
    state: present

- name: Enable lingering for aap user
  ansible.builtin.command:
    cmd: "loginctl enable-linger aap"
    creates: "/var/lib/systemd/linger/aap"

# 2. Networking Permissions (CRITICAL for Port 443)
- name: Allow aap user to bind to privileged ports
  ansible.posix.sysctl:
    name: net.ipv4.ip_unprivileged_port_start
    value: '80'
    sysctl_set: yes
    state: present
    reload: yes

- name: Open firewall for AAP
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: yes
    state: enabled
    immediate: yes
  loop: [http, https]

# 3. File Management (Already completed in your manual run)
# ... [Keep your previous SCP and Extract tasks here] ...

# 4. Execute Installer
- name: Execute Containerized Installer
  ansible.builtin.command:
    cmd: "ansible-playbook -i inventory ansible.containerized_installer.install"
    chdir: "/home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-5-x86_64/"
  become: yes
  become_user: aap
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ ansible_user_uid }}" # Collected via setup/facts
  async: 3600 
  poll: 60