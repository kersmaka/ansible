---
# 1. OS & Dependency Setup
- name: Install required system packages
  ansible.builtin.dnf:
    name:
      - ansible-core
      - python3-firewall
      - firewalld
    state: present

- name: Ensure firewalld is enabled and running
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: yes

- name: Create the aap user
  ansible.builtin.user:
    name: aap
    password: "{{ 'redhat' | password_hash('sha512') }}"
    groups: wheel
    generate_ssh_key: yes
    state: present

- name: Get aap UID
  ansible.builtin.command: id -u aap
  register: aap_uid
  changed_when: false

- name: Enable lingering for aap user
  ansible.builtin.command:
    cmd: "loginctl enable-linger aap"
    creates: "/var/lib/systemd/linger/aap"

# 2. Networking Fixes (Port Binding and Firewall)
- name: Allow aap user to bind to privileged ports (80/443)
  ansible.posix.sysctl:
    name: net.ipv4.ip_unprivileged_port_start
    value: '80'
    sysctl_set: yes
    state: present
    reload: yes



- name: Open HTTP and HTTPS ports in firewalld
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: yes
    state: enabled
    immediate: yes
  loop:
    - http
    - https
  ignore_errors: yes # If firewalld is still being difficult, we don't want to stop the whole play

# 3. SSH Trust & File Transfers
- name: Inject aap public key into Debian root authorized_keys
  ansible.posix.authorized_key:
    user: root
    state: present
    key: "{{ lookup('file', '/home/aap/.ssh/id_rsa.pub') }}"
  delegate_to: 192.168.0.249
  vars:
    ansible_port: 2732

- name: Pull AAP bundle and Inventory via SCP
  ansible.builtin.shell:
    cmd: "scp -P 2732 -o StrictHostKeyChecking=no root@192.168.0.249:{{ item.src }} {{ item.dest }}"
    creates: "{{ item.dest }}"
  loop:
    - { src: '/mnt/storage/ansible/aapVersions/ansible-automation-platform-containerized-setup-bundle-2.6-5-x86_64.tar.gz', dest: '/home/aap/setup/aap_bundle.tar.gz' }
    - { src: '/home/ansible/ansibleInventory/inventory', dest: '/home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-5-x86_64/inventory' }
  become: yes
  become_user: aap

# 4. Final Installation / Restart Services
- name: Execute Containerized Installer
  ansible.builtin.command:
    cmd: "ansible-playbook -i inventory ansible.containerized_installer.install"
    chdir: "/home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-5-x86_64/"
  become: yes
  become_user: aap
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ aap_uid.stdout }}"
  async: 3600 
  poll: 60