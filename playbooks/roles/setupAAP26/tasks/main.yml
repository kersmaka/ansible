---
# 1. OS & Dependency Setup
- name: Install required system packages
  ansible.builtin.dnf:
    name:
      - ansible-core
      - python3-firewall
      - firewalld
    state: present

- name: Ensure firewalld is enabled and running
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: yes

- name: Create the aap user
  ansible.builtin.user:
    name: aap
    password: "{{ 'redhat' | password_hash('sha512') }}"
    groups: wheel
    generate_ssh_key: yes
    state: present

- name: Get aap UID
  ansible.builtin.command: id -u aap
  register: aap_uid
  changed_when: false

- name: Enable lingering for aap user
  ansible.builtin.command:
    cmd: "loginctl enable-linger aap"
    creates: "/var/lib/systemd/linger/aap"

# 2. Networking Fixes (Crucial for 443 Binding)
- name: Allow aap user to bind to privileged ports (80/443)
  ansible.posix.sysctl:
    name: net.ipv4.ip_unprivileged_port_start
    value: '80'
    sysctl_set: yes
    state: present
    reload: yes

- name: Open HTTP and HTTPS ports in firewalld
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: yes
    state: enabled
    immediate: yes
  loop: [http, https]

# 3. Robust Cleanup (Fixes the "container is running" error)
- name: Force stop all existing containers
  ansible.builtin.shell:
    cmd: "podman stop --all"
  become: yes
  become_user: aap
  ignore_errors: yes

- name: Force remove all existing containers
  ansible.builtin.shell:
    cmd: "podman rm --all --force"
  become: yes
  become_user: aap
  ignore_errors: yes

- name: Start Podman user socket
  ansible.builtin.systemd:
    name: podman.socket
    scope: user
    state: started
    enabled: yes
  become: yes
  become_user: aap
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ aap_uid.stdout }}"
  ignore_errors: yes  

# 4. SSH Trust & Extractions
- name: Slurp the aap user's public key
  ansible.builtin.slurp:
    src: /home/aap/.ssh/id_rsa.pub
  register: aap_pub_key

- name: Inject aap public key into Debian root authorized_keys
  ansible.posix.authorized_key:
    user: root
    state: present
    key: "{{ aap_pub_key['content'] | b64decode }}"
  delegate_to: 192.168.0.249
  vars:
    ansible_port: 2732

- name: Pull AAP bundle and Inventory via SCP
  ansible.builtin.shell:
    cmd: "scp -P 2732 -o StrictHostKeyChecking=no root@192.168.0.249:{{ item.src }} {{ item.dest }}"
    creates: "{{ item.dest }}"
  loop:
    - { src: '/mnt/storage/ansible/aapVersions/ansible-automation-platform-containerized-setup-bundle-2.6-5-x86_64.tar.gz', dest: '/home/aap/setup/aap_bundle.tar.gz' }
    - { src: '/home/ansible/ansibleInventory/inventory', dest: '/home/aap/setup/inventory' }
  become: yes
  become_user: aap

- name: Extract AAP bundle
  ansible.builtin.unarchive:
    src: /home/aap/setup/aap_bundle.tar.gz
    dest: /home/aap/
    remote_src: yes
    owner: aap
    group: aap

# 5. Final Installation
- name: Execute Containerized Installer
  ansible.builtin.command:
    cmd: "ansible-playbook -i /home/aap/setup/inventory ansible.containerized_installer.install"
    chdir: "/home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-5-x86_64/"
  become: yes
  become_user: aap
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ aap_uid.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ aap_uid.stdout }}/bus"
  async: 3600 
  poll: 60