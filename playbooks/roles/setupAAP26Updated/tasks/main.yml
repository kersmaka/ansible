---
# 1. OS & Dependency Setup
- name: Install required system packages
  ansible.builtin.dnf:
    name:
      - ansible-core
    state: present

# 2. User Setup
- name: Create the aap user
  ansible.builtin.user:
    name: aap
    password: "{{ 'redhat' | password_hash('sha512') }}"
    groups: wheel
    generate_ssh_key: yes
    append: true
    state: present

# 3. SSH Trust
- name: Slurp the aap user's public key
  ansible.builtin.slurp:
    src: /home/aap/.ssh/id_rsa.pub
  register: aap_pub_key

- name: Inject aap public key into Debian root authorized_keys
  ansible.posix.authorized_key:
    user: root
    state: present
    key: "{{ aap_pub_key['content'] | b64decode }}"
  delegate_to: 192.168.0.249
  vars:
    ansible_port: 2732

- name: Ensure .ssh directory exists on AAP container
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    mode: '0700'
  delegate_to: localhost

- name: Generate SSH key on AAP container if not present
  ansible.builtin.command:
    cmd: ssh-keygen -t rsa -b 4096 -f /root/.ssh/id_rsa -N ""
    creates: /root/.ssh/id_rsa
  delegate_to: localhost

- name: Copy SSH public key to ansiblebackup2 for multiple users
  ansible.posix.authorized_key:
    user: "{{ ssh_user }}"
    state: present
    key: "{{ lookup('file', '/root/.ssh/id_rsa.pub') }}"
  loop:
    - root
    - aap
  loop_control:
    loop_var: ssh_user

# 4. AAP Bundle Setup
- name: Ensure aap setup directory exists
  ansible.builtin.file:
    path: /home/aap/setup
    state: directory
    owner: aap
    group: aap
    mode: '0755'

- name: Pull AAP bundle and Inventory via SCP
  ansible.builtin.shell:
    cmd: "scp -P 2732 -o StrictHostKeyChecking=no root@192.168.0.249:{{ item.src }} {{ item.dest }}"
    creates: "{{ item.dest }}"
  loop:
    - { src: '/mnt/storage/ansible/aapVersions/ansible-automation-platform-containerized-setup-bundle-2.6-5-x86_64.tar.gz', dest: '/home/aap/setup/aap_bundle.tar.gz' }
    - { src: '/home/ansible/ansibleInventory/inventory', dest: '/home/aap/setup/inventory' }
  become: yes
  become_user: aap

- name: Extract AAP bundle
  ansible.builtin.unarchive:
    src: /home/aap/setup/aap_bundle.tar.gz
    dest: /home/aap/
    remote_src: yes
    owner: aap
    group: aap

# 5. /etc/hosts
- name: Remove stale ansiblebackup2 entry from /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '.*ansiblebackup2.*'
    state: absent

- name: Add ansiblebackup2 entry to /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ ansiblebackup2_ip }} ansiblebackup2.homelab.com ansiblebackup2"
    state: present