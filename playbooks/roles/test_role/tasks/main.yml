- name: Test connectivity to google.com via proxy
  ansible.builtin.shell: |
    curl -s -o /dev/null -w "%{http_code}" http://google.com
  environment: "{{ proxy_env }}"
  register: ping_result
  changed_when: false

- name: Show connectivity result
  ansible.builtin.debug:
    msg: "google.com responded with HTTP {{ ping_result.stdout }}"