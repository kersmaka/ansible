- name: Resolve ansiblebackup2.homelab.com IP from runner
  command: getent hosts ansiblebackup2.homelab.com
  register: ansiblebackup2_host
  delegate_to: localhost
  changed_when: false

- name: Add ansiblebackup2 to /etc/hosts on ansible.homelab.com
  lineinfile:
    path: /etc/hosts
    line: "{{ ansiblebackup2_host.stdout.split()[0] }} ansiblebackup2.homelab.com"
    regexp: '.*ansiblebackup2\.homelab\.com.*'
    state: present
  become: true
  delegate_to: ansible.homelab.com

- name: Create AAP backup tarball on ansible.homelab.com
  delegate_to: ansible.homelab.com
  become_user: aap
  shell: >
    tar -cvzf /home/aap/aap-backup-manual.tar.gz
    /home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-1.1-x86_64/backups/
  args:
    executable: /bin/bash
    creates: /home/aap/aap-backup-manual.tar.gz
    
- name: SCP backup from ansible to ansiblebackup2
  delegate_to: ansible.homelab.com
  become_user: aap
  shell: >
    scp -o StrictHostKeyChecking=no
    /home/aap/aap-backup-manual.tar.gz
    aap@ansiblebackup2.homelab.com:/home/aap/aap-backup-manual.tar.gz
  args:
    executable: /bin/bash
# ── 3. Enable lingering for aap user ───────────────────────────────────────
- name: Enable lingering for aap user
  command: loginctl enable-linger aap
# ── 4. Get aap user UID ────────────────────────────────────────────────────
- name: Get aap user UID
  command: id -u aap
  register: aap_uid
  changed_when: false
# ── 5. Run the restore playbook ────────────────────────────────────────────
- name: Execute Containerized Restore
  shell: >
    ansible-playbook -i /home/aap/setup/inventory
    ansible.containerized_installer.restore
    -e "restore_backup_file=/home/aap/aap-backup-manual.tar.gz"
  args:
    chdir: /home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-5-x86_64
  become_user: aap
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ aap_uid.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ aap_uid.stdout }}/bus"