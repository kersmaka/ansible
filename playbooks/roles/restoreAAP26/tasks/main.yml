- name: Slurp aap public key from ansible.homelab.com
  slurp:
    src: /home/aap/.ssh/id_rsa.pub
  register: ansible_aap_pubkey
  delegate_to: ansible.homelab.com
  become_user: aap

- name: Inject ansible aap public key into ansiblebackup2 authorized_keys
  authorized_key:
    user: aap
    state: present
    key: "{{ ansible_aap_pubkey.content | b64decode }}"

- name: Add ansiblebackup2 to /etc/hosts on ansible.homelab.com
  lineinfile:
    path: /etc/hosts
    line: "{{ hostvars['ansiblebackup2.homelab.com']['ansible_host'] | default(hostvars['ansiblebackup2.homelab.com']['ansible_default_ipv4']['address']) }} ansiblebackup2.homelab.com"
    regexp: '.*ansiblebackup2\.homelab\.com.*'
    state: present
  become: true
  delegate_to: ansible.homelab.com

- name: Create AAP backup tarball from most recent backup on ansible.homelab.com
  delegate_to: ansible.homelab.com
  become_user: aap
  shell: >
    tar -czf /home/aap/aap-backup-manual.tar.gz
    /home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-1.1-x86_64/backups/{{ latest_backup_dir.stdout }}/
  args:
    executable: /bin/bash

- name: SCP backup from ansible to ansiblebackup2
  delegate_to: ansible.homelab.com
  become_user: aap
  shell: >
    scp
    -o StrictHostKeyChecking=no
    -o BatchMode=yes
    -o ConnectTimeout=30
    /home/aap/aap-backup-manual.tar.gz
    aap@ansiblebackup2.homelab.com:/home/aap/aap-backup-manual.tar.gz
  args:
    executable: /bin/bash
  async: 3600
  poll: 30

# ── 1. Prepare the bundle backup directory ────────────────────────────────
- name: Ensure the backups directory exists in the bundle
  file:
    path: /home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-5-x86_64/backups
    state: directory
    owner: aap
    group: aap
    mode: '0755'

# ── 2. Extract and Flatten ────────────────────────────────────────────────
- name: Extract manual backup into the bundle backups folder
  unarchive:
    src: /home/aap/aap-backup-manual.tar.gz
    dest: /home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-5-x86_64/backups/
    remote_src: yes
    extra_opts: ['--strip-components=4']  # Strips: home/aap/<bundle-2.6-1.1>/backups/ leaving files flat
    owner: aap
    group: aap

- name: Rename backup artifacts to match the destination hostname
  ansible.builtin.shell: |
    for file in *ansible.homelab.com*; do
      [ -e "$file" ] || continue
      mv "$file" "${file//ansible.homelab.com/ansiblebackup2.homelab.com}"
    done
  args:
    chdir: /home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-5-x86_64/backups/

# ── 3. Enable lingering for aap user ───────────────────────────────────────
- name: Enable lingering for aap user
  command: loginctl enable-linger aap

# ── 4. Get aap user UID ────────────────────────────────────────────────────
- name: Get aap user UID
  command: id -u aap
  register: aap_uid
  changed_when: false

- name: Execute Containerized Restore
  shell: >
    ansible-playbook -i /home/aap/setup/inventory
    ansible.containerized_installer.restore
    -e "backup_dir=/home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-5-x86_64"
  args:
    chdir: /home/aap/ansible-automation-platform-containerized-setup-bundle-2.6-5-x86_64
  become_user: aap
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ aap_uid.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ aap_uid.stdout }}/bus"