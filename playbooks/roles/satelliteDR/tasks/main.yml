---
- name: Verify OS is RHEL/Rocky/AlmaLinux 9
  ansible.builtin.assert:
    that:
      - ansible_distribution_major_version == "9"
    fail_msg: "This playbook requires EL9. Found: {{ ansible_distribution }} {{ ansible_distribution_major_version }}"
    success_msg: "OS check passed: {{ ansible_distribution }} {{ ansible_distribution_major_version }}"
  tags:
    - preflight
    - always

- name: Configure repositories and install maintenance tools
  block:
    - name: Import GPG keys for Puppet and Foreman
      ansible.builtin.rpm_key:
        key: "{{ item }}"
        state: present
      loop:
        - "{{ puppet_gpg_key }}"
        - "{{ foreman_gpg_key }}"

    - name: Install Puppet and Foreman release RPMs
      ansible.builtin.dnf:
        name:
          - "{{ puppet_release_rpm }}"
          - "{{ foreman_release_rpm }}"
        state: present
        disable_gpg_check: false

    - name: Install foreman-installer and maintenance tools
      ansible.builtin.dnf:
        name:
          - "{{ foreman_installer_package }}"
          - rubygem-foreman_maintain
        state: present
  tags:
    - repos
    - install

- name: Configure networking and hostname
  block:
    - name: Get primary IPv4 address
      ansible.builtin.set_fact:
        foreman_ip: "{{ ansible_default_ipv4.address }}"

    - name: Ensure foreman.homelab.com is in /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '.*foreman\.homelab\.com.*'
        line: "{{ foreman_ip }}\tforeman.homelab.com foreman"
        state: present
        backup: yes

    - name: Set hostname to foreman.homelab.com
      ansible.builtin.hostname:
        name: foreman.homelab.com
  tags:
    - preflight
    - networking

- name: Handle Katello backup archive
  block:
    - name: Ensure rsync is installed on kvm_host
      ansible.builtin.package:
        name: rsync
        state: present
      delegate_to: kvm_host

    - name: Copy Katello backup from kvm_host
      ansible.builtin.synchronize:
        src: "/home/temp/{{ katello_backup_file }}"
        dest: "/tmp/{{ katello_backup_file }}"
        mode: push
        dest_port: 22
      delegate_to: kvm_host

    - name: Ensure /home/temp directory exists
      ansible.builtin.file:
        path: /home/temp
        state: directory
        mode: '0755'

    - name: Extract archive to /home/temp
      ansible.builtin.unarchive:
        src: "/tmp/{{ katello_backup_file }}"
        dest: /home/temp/
        remote_src: yes
  tags:
    - restore

- name: Enable Satellite repositories via subscription-manager
  ansible.builtin.command:
    cmd: >-
      subscription-manager repos
      --enable=satellite-6.16-for-rhel-9-x86_64-rpms
      --enable=satellite-maintenance-6.16-for-rhel-9-x86_64-rpms
      --enable=satellite-client-6-for-rhel-9-x86_64-rpms
  tags:
    - repos

- name: Prepare database for restore
  block:
    - name: Stop all services to release database locks
      ansible.builtin.command: foreman-maintain service stop

    - name: Start PostgreSQL only for maintenance
      ansible.builtin.systemd:
        name: postgresql
        state: started

    - name: Drop existing databases to ensure clean restore
      ansible.builtin.shell: |
        sudo -u postgres dropdb {{ db_name }} || true
      loop:
        - candlepin
        - foreman
        - pulpcore
      loop_control:
        loop_var: db_name
  tags:
    - restore

- name: Pre-process foreman dump to remove corrupt FK constraint
  # FIX: The foreman.dump has a FK constraint referencing a row that does not
  #      exist due to a race condition during the online backup. foreman-maintain
  #      will always fatal on this. We pre-restore the foreman DB ourselves with
  #      the bad constraint line removed, then whitelist restore-foreman-dump so
  #      foreman-maintain skips its own attempt and continues cleanly.
  block:
    - name: Start PostgreSQL for pre-restore processing
      ansible.builtin.systemd:
        name: postgresql
        state: started

    - name: Drop foreman database if it exists before pre-restore
      ansible.builtin.shell: |
        sudo -u postgres dropdb foreman || true

    - name: Extract foreman dump to SQL file
      ansible.builtin.shell: |
        sudo -u postgres pg_restore \
          --file=/tmp/foreman_restore.sql \
          /home/temp/{{ katello_backup_dir }}/foreman.dump
      failed_when: false

    - name: Remove corrupt FK constraint line from SQL dump
      ansible.builtin.lineinfile:
        path: /tmp/foreman_restore.sql
        regexp: '.*fk_rails_08d19b0160.*'
        state: absent

    - name: Restore cleaned foreman SQL into foreman db
      ansible.builtin.shell: |
        sudo -u postgres createdb -O foreman foreman || true
        sudo -u postgres psql -d foreman -f /tmp/foreman_restore.sql
      register: foreman_sql_restore
      failed_when: foreman_sql_restore.rc != 0

    - name: Stop PostgreSQL before foreman-maintain takes over
      ansible.builtin.systemd:
        name: postgresql
        state: stopped
  tags:
    - restore

- name: Restore Katello backup via foreman-maintain
  ansible.builtin.command:
    cmd: >-
      foreman-maintain restore /home/temp/{{ katello_backup_dir }}
      --assumeyes
      --whitelist=candlepin-db-up,foreman-db-up,pulpcore-db-up,restore-drop-databases,restore-foreman-dump,restore-validate-hostname,restore-validate-backup,restore-validate-interfaces,restore-installer-reset,installer-run
  tags:
    - restore

- name: Post-restore configuration fixes
  block:
    - name: Refresh DNF metadata and subscriptions
      ansible.builtin.shell: |
        subscription-manager refresh
        dnf clean all
        dnf makecache

    - name: Resolve pulpcore-plugin(python) dependency manually
      ansible.builtin.shell: |
        dnf install -y 'pulpcore-plugin(python)' || dnf install -y python3-pulp-python
      register: dnf_fix
      failed_when: false

    - name: Fix interface names in installer answers
      ansible.builtin.replace:
        path: /etc/foreman-installer/scenarios.d/katello-answers.yaml
        regexp: '(interface|dns_interface|dhcp_interface):.*'
        replace: '\1: {{ ansible_default_ipv4.interface }}'
  tags:
    - restore
- name: Finalize restore and reconcile services
  block:
    - name: Ensure PostgreSQL is running after foreman-maintain
      ansible.builtin.systemd:
        name: postgresql
        state: started

    # FIX: Clean up orphaned FK record left by online backup inconsistency
    - name: Clean up orphaned katello_content_view_environment_content_facets records
      ansible.builtin.shell: |
        sudo -u postgres psql -d foreman -c "
          DELETE FROM katello_content_view_environment_content_facets
          WHERE content_facet_id NOT IN (SELECT id FROM katello_content_facets);
        "
      register: fk_cleanup
      changed_when: "'DELETE' in fk_cleanup.stdout"

    # FIX: Split rake tasks so failures are visible instead of silently ignored
    - name: Run database migrations
      ansible.builtin.command: foreman-rake db:migrate
      register: db_migrate_result
      failed_when: db_migrate_result.rc != 0

    - name: Run database seeds
      ansible.builtin.command: foreman-rake db:seed
      register: db_seed_result
      failed_when: db_seed_result.rc != 0

    - name: Rebuild apipie cache
      ansible.builtin.command: foreman-rake apipie:cache:index
      ignore_errors: yes  # non-critical, safe to ignore

    # FIX: Verify the foreman database actually exists before running the installer
    - name: Verify foreman database exists before running installer
      ansible.builtin.shell: |
        sudo -u postgres psql -lqt | cut -d \| -f 1 | grep -qw foreman
      register: db_check
      failed_when: db_check.rc != 0
      changed_when: false

    # FIX: Added --skip-checks-i-know-better to suppress the DB warning and
    #      prevent the Foreman::Register Puppet resource from attempting API
    #      calls against a not-yet-healthy Foreman instance
    - name: Run foreman-installer to reconcile configuration
      ansible.builtin.command:
        cmd: >-
          foreman-installer
          --foreman-proxy-dhcp-interface={{ ansible_default_ipv4.interface }}
          --foreman-proxy-dns-interface={{ ansible_default_ipv4.interface }}
          --foreman-proxy-content-enable-python=false
          --foreman-proxy-register-in-foreman=false
          --skip-checks-i-know-better
      register: foreman_installer_result
      failed_when: foreman_installer_result.rc != 0

    # FIX: Wait for the Foreman API to be healthy before declaring success,
    #      catching the 500 error that caused the original failure
    - name: Wait for Foreman API to become healthy
      ansible.builtin.uri:
        url: "https://foreman.homelab.com/api/v2/hosts"
        method: GET
        validate_certs: no
        status_code: 200
      register: api_check
      retries: 10
      delay: 30
      until: api_check.status == 200
  tags:
    - restore