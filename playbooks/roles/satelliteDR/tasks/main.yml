---
- name: Verify OS is RHEL/Rocky/AlmaLinux 9
  ansible.builtin.assert:
    that:
      - ansible_distribution_major_version == "9"
    fail_msg: "This playbook requires EL9. Found: {{ ansible_distribution }} {{ ansible_distribution_major_version }}"
    success_msg: "OS check passed: {{ ansible_distribution }} {{ ansible_distribution_major_version }}"
  tags:
    - preflight
    - always

- name: Import GPG keys for Puppet and Foreman
  ansible.builtin.rpm_key:
    key: "{{ item }}"
    state: present
  loop:
    - "{{ puppet_gpg_key }}"
    - "{{ foreman_gpg_key }}"
  tags:
    - repos

- name: Install Puppet and Foreman release RPMs
  ansible.builtin.dnf:
    name:
      - "{{ puppet_release_rpm }}"
      - "{{ foreman_release_rpm }}"
    state: present
    disable_gpg_check: false
  tags:
    - repos

- name: Install foreman-installer and maintenance tools
  ansible.builtin.dnf:
    name:
      - "{{ foreman_installer_package }}"
      - rubygem-foreman_maintain
    state: present
  tags:
    - foreman
    - install

- name: Configure networking and hostname
  block:
    - name: Get primary IPv4 address
      ansible.builtin.set_fact:
        foreman_ip: "{{ ansible_default_ipv4.address }}"

    - name: Ensure foreman.homelab.com is in /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '.*foreman\.homelab\.com.*'
        line: "{{ foreman_ip }}\tforeman.homelab.com foreman"
        state: present
        backup: yes

    - name: Set hostname to foreman.homelab.com
      ansible.builtin.hostname:
        name: foreman.homelab.com
  tags:
    - preflight
    - networking

- name: Handle Katello backup archive
  block:
    - name: Ensure rsync is installed on kvm_host
      ansible.builtin.package:
        name: rsync
        state: present
      delegate_to: kvm_host

    - name: Copy Katello backup from kvm_host
      ansible.builtin.synchronize:
        src: "/home/temp/{{ katello_backup_file }}"
        dest: "/tmp/{{ katello_backup_file }}"
        mode: push
        dest_port: 22
      delegate_to: kvm_host

    - name: Extract Katello backup archive
      ansible.builtin.file:
        path: /home/temp
        state: directory
        mode: '0755'

    - name: Extract archive to /home/temp
      ansible.builtin.unarchive:
        src: "/tmp/{{ katello_backup_file }}"
        dest: /home/temp/
        remote_src: yes
  tags:
    - foreman
    - restore

- name: Enable Satellite repositories
  ansible.builtin.command:
    cmd: >-
      subscription-manager repos
      --enable=satellite-6.16-for-rhel-9-x86_64-rpms
      --enable=satellite-maintenance-6.16-for-rhel-9-x86_64-rpms
      --enable=satellite-client-6-for-rhel-9-x86_64-rpms
  tags:
    - foreman
    - repos

- name: Prepare clean state for restore
  block:
    - name: Stop all Foreman services to release DB locks
      ansible.builtin.command: foreman-maintain service stop

    - name: Start PostgreSQL only for database maintenance
      ansible.builtin.systemd:
        name: postgresql
        state: started

    - name: Drop existing databases
      ansible.builtin.shell: |
        sudo -u postgres dropdb {{ db_name }} || true
      loop:
        - candlepin
        - foreman
        - pulpcore
      loop_control:
        loop_var: db_name
  tags:
    - foreman
    - restore

- name: Restore Katello backup via foreman-maintain
  ansible.builtin.command:
    cmd: >-
      foreman-maintain restore /home/temp/{{ katello_backup_dir }}
      --assumeyes
      --whitelist=restore-pulpcore-dump,restore-candlepin-dump,restore-foreman-dump,restore-drop-databases,pulpcore-db-up,restore-installer-reset,restore-validate-hostname,restore-validate-backup,restore-validate-interfaces,candlepin-db-up,foreman-db-up,installer-run
  tags:
    - foreman
    - restore

- name: Post-restore environment cleanup
  block:
    - name: Refresh subscriptions and DNF metadata
      ansible.builtin.shell: |
        subscription-manager refresh
        dnf clean all
        dnf makecache

    - name: Ensure pulpcore-plugin(python) dependencies are met
      ansible.builtin.shell: |
        dnf install -y 'pulpcore-plugin(python)' || dnf install -y python3-pulp-python
      register: dnf_fix
      failed_when: false

    - name: Update interface names in installer answers
      ansible.builtin.replace:
        path: /etc/foreman-installer/scenarios.d/katello-answers.yaml
        regexp: '(interface|dns_interface|dhcp_interface):.*'
        replace: '\1: {{ ansible_default_ipv4.interface }}'
  tags:
    - foreman
    - restore

- name: Finalize restore and reconcile configuration
  block:
    - name: Ensure PostgreSQL is running for rake tasks
      ansible.builtin.systemd:
        name: postgresql
        state: started

    - name: Run database migrations and seeds
      ansible.builtin.shell: |
        foreman-rake db:migrate
        foreman-rake db:seed
        foreman-rake apipie:cache:index
      ignore_errors: yes

    - name: Run foreman-installer to reconcile
      ansible.builtin.command:
        cmd: >-
          foreman-installer 
          --foreman-proxy-dhcp-interface={{ ansible_default_ipv4.interface }}
          --foreman-proxy-dns-interface={{ ansible_default_ipv4.interface }}
          --foreman-proxy-content-enable-python=false
          --foreman-proxy-register-in-foreman=false
      register: foreman_installer_result
  tags:
    - foreman
    - restore