---
- name: Verify OS is RHEL/Rocky/AlmaLinux 9
  ansible.builtin.assert:
    that:
      - ansible_distribution_major_version == "9"
    fail_msg: "This playbook requires EL9. Found: {{ ansible_distribution }} {{ ansible_distribution_major_version }}"
    success_msg: "OS check passed: {{ ansible_distribution }} {{ ansible_distribution_major_version }}"
  tags:
    - preflight
    - always

- name: Configure repositories and install maintenance tools
  block:
    - name: Import GPG keys for Puppet and Foreman
      ansible.builtin.rpm_key:
        key: "{{ gpg_key_item }}"
        state: present
      loop:
        - "{{ puppet_gpg_key }}"
        - "{{ foreman_gpg_key }}"
      loop_control:
        loop_var: gpg_key_item

    - name: Install Puppet and Foreman release RPMs
      ansible.builtin.dnf:
        name:
          - "{{ puppet_release_rpm }}"
          - "{{ foreman_release_rpm }}"
        state: present
        disable_gpg_check: false

    - name: Install foreman-installer and maintenance tools
      ansible.builtin.dnf:
        name:
          - "{{ foreman_installer_package }}"
          - rubygem-foreman_maintain
        state: present
  tags:
    - repos
    - install

- name: Configure networking and hostname
  block:
    - name: Get primary IPv4 address
      ansible.builtin.set_fact:
        foreman_ip: "{{ ansible_default_ipv4.address }}"

    - name: Ensure foreman.homelab.com is in /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '.*foreman\.homelab\.com.*'
        line: "{{ foreman_ip }}\tforeman.homelab.com foreman"
        state: present
        backup: yes

    - name: Set hostname to foreman.homelab.com
      ansible.builtin.hostname:
        name: foreman.homelab.com
  tags:
    - preflight
    - networking

- name: Handle Katello backup archive
  block:
    - name: Ensure rsync is installed on kvm_host
      ansible.builtin.package:
        name: rsync
        state: present
      delegate_to: kvm_host

    - name: Copy Katello backup from kvm_host
      ansible.builtin.synchronize:
        src: "/home/temp/{{ katello_backup_file }}"
        dest: "/tmp/{{ katello_backup_file }}"
        mode: push
        dest_port: 22
      delegate_to: kvm_host

    - name: Ensure /home/temp directory exists
      ansible.builtin.file:
        path: /home/temp
        state: directory
        mode: '0755'

    - name: Extract archive to /home/temp
      ansible.builtin.unarchive:
        src: "/tmp/{{ katello_backup_file }}"
        dest: /home/temp/
        remote_src: yes
  tags:
    - restore

- name: Enable Satellite repositories via subscription-manager
  ansible.builtin.command:
    cmd: >-
      subscription-manager repos
      --enable=satellite-6.16-for-rhel-9-x86_64-rpms
      --enable=satellite-maintenance-6.16-for-rhel-9-x86_64-rpms
      --enable=satellite-client-6-for-rhel-9-x86_64-rpms
  tags:
    - repos

- name: Prepare database for restore
  block:
    - name: Stop all services to release database locks
      ansible.builtin.command: foreman-maintain service stop

    - name: Start PostgreSQL only for maintenance
      ansible.builtin.systemd:
        name: postgresql
        state: started

    - name: Drop existing databases to ensure clean restore
      ansible.builtin.shell: |
        sudo -u postgres dropdb {{ db_name }} || true
      loop:
        - candlepin
        - foreman
        - pulpcore
      loop_control:
        loop_var: db_name
  tags:
    - restore

# NOTE on restore-foreman-dump whitelist behavior (learned across runs 49-52):
#
#   Whitelisting restore-foreman-dump causes foreman-maintain to SKIP that step
#   entirely in every tested run — it does NOT merely suppress the exit code.
#   Not whitelisting it causes foreman-maintain to exit rc=1 on the FK violation
#   in the backup, failing the Ansible task even though pg_restore warns only.
#
#   Resolution: whitelist restore-foreman-dump so foreman-maintain handles all
#   other steps (candlepin, pulpcore, configs, pulp data), then immediately
#   after we manually run pg_restore for the foreman dump ourselves.
- name: Restore Katello backup via foreman-maintain (skips foreman dump intentionally)
  ansible.builtin.command:
    cmd: >-
      foreman-maintain restore /home/temp/{{ katello_backup_dir }}
      --assumeyes
      --whitelist=candlepin-db-up,foreman-db-up,pulpcore-db-up,restore-drop-databases,restore-foreman-dump,restore-validate-hostname,restore-validate-backup,restore-validate-interfaces,restore-installer-reset,installer-run
  tags:
    - restore

# FIX: foreman-maintain stops PostgreSQL at the end of its restore sequence.
#      We must restart it before running pg_restore manually.
- name: Start PostgreSQL before manual foreman dump restore
  ansible.builtin.systemd:
    name: postgresql
    state: started
  tags:
    - restore

# FIX: Manually restore the foreman PostgreSQL dump because foreman-maintain
#      always SKIPS restore-foreman-dump when it is whitelisted. The dump
#      contains one known FK violation (content_facet_id=45 orphan from an
#      online backup race condition) which causes pg_restore to exit rc=1 —
#      this is expected and safe. The orphaned row is cleaned up below.
- name: Manually restore foreman PostgreSQL dump
  ansible.builtin.shell: |
    sudo -u postgres pg_restore -C -d postgres \
      /home/temp/{{ katello_backup_dir }}/foreman.dump
  register: foreman_pg_restore
  failed_when: foreman_pg_restore.rc > 1
  changed_when: true
  tags:
    - restore

- name: Post-restore configuration fixes
  block:
    - name: Refresh DNF metadata and subscriptions
      ansible.builtin.shell: |
        subscription-manager refresh
        dnf clean all
        dnf makecache

    # NOTE: Both pulpcore-plugin(python) and python3-pulp-python are not
    #       available in Satellite 6.16 repos. Safe to ignore — the dependency
    #       is already satisfied by another installed package.
    - name: Resolve pulpcore-plugin(python) dependency manually
      ansible.builtin.shell: |
        dnf install -y 'pulpcore-plugin(python)' || dnf install -y python3-pulp-python
      register: dnf_fix
      failed_when: false

    - name: Fix interface names in installer answers
      ansible.builtin.replace:
        path: /etc/foreman-installer/scenarios.d/katello-answers.yaml
        regexp: '(interface|dns_interface|dhcp_interface):.*'
        replace: '\1: {{ ansible_default_ipv4.interface }}'
  tags:
    - restore

- name: Finalize restore and reconcile services
  block:
    - name: Ensure PostgreSQL is running after foreman-maintain
      ansible.builtin.systemd:
        name: postgresql
        state: started

    # FIX: Verify the foreman database actually exists before proceeding.
    #      Catches the case where restore-foreman-dump was silently skipped.
    - name: Verify foreman database exists before proceeding
      ansible.builtin.shell: |
        sudo -u postgres psql -lqt | cut -d \| -f 1 | grep -qw foreman
      register: db_check
      failed_when: db_check.rc != 0
      changed_when: false

    # FIX: Clean up orphaned FK record left by online backup race condition.
    #      Uses ignore_errors because the row may or may not be present.
    - name: Clean up orphaned katello_content_view_environment_content_facets records
      ansible.builtin.shell: |
        sudo -u postgres psql -d foreman -c "
          DELETE FROM katello_content_view_environment_content_facets
          WHERE content_facet_id NOT IN (SELECT id FROM katello_content_facets);
        "
      register: fk_cleanup
      changed_when: "'DELETE' in fk_cleanup.stdout"
      ignore_errors: yes

    - name: Run database migrations
      ansible.builtin.command: foreman-rake db:migrate
      register: db_migrate_result
      failed_when: db_migrate_result.rc != 0

    # FIX: db:seed fails with NoMethodError on Filter#override= if the column
    #      is missing from the restored schema. Ensure it exists before seeding.
    - name: Ensure filters table has override column
      ansible.builtin.shell: |
        sudo -u postgres psql -d foreman -c "
          ALTER TABLE filters ADD COLUMN IF NOT EXISTS override boolean DEFAULT false;
        "
      changed_when: false

    - name: Run database seeds
      ansible.builtin.command: foreman-rake db:seed
      register: db_seed_result
      failed_when: db_seed_result.rc != 0

    # FIX: Start Redis before apipie cache rebuild. Without it, foreman-rake
    #      opens hundreds of sockets and hits EMFILE (too many open files).
    - name: Start Redis before apipie cache rebuild
      ansible.builtin.systemd:
        name: redis
        state: started

    # FIX: Run foreman-installer BEFORE rebuilding caches. The installer
    #      restarts services and runs upgrade:run rake tasks which can
    #      regenerate or corrupt cache state. Building cache before the
    #      installer runs is wasted effort and causes the Marshal format
    #      mismatch 500 error on the API health check.
    - name: Run foreman-installer to reconcile configuration
      ansible.builtin.command:
        cmd: >-
          foreman-installer
          --foreman-proxy-dhcp-interface={{ ansible_default_ipv4.interface }}
          --foreman-proxy-dns-interface={{ ansible_default_ipv4.interface }}
          --foreman-proxy-content-enable-python=false
          --foreman-proxy-register-in-foreman=false
          --foreman-register-in-foreman=false
          --skip-checks-i-know-better
      register: foreman_installer_result
      failed_when: foreman_installer_result.rc != 0

    # FIX: Nuke ALL cache locations after foreman-installer completes.
    #      The installer's upgrade:run tasks can leave stale or partially-written
    #      Marshal files in both tmp/cache and apipie-cache. The Marshal format
    #      mismatch 500 error persists when only apipie-cache is cleared because
    #      Rails tmp/cache also holds serialized objects from the backup's Ruby
    #      version. Both must be wiped and rebuilt cleanly after the installer.
    - name: Nuke full Rails tmp/cache directory
      ansible.builtin.file:
        path: /usr/share/foreman/tmp/cache
        state: absent

    - name: Recreate Rails tmp/cache directory
      ansible.builtin.file:
        path: /usr/share/foreman/tmp/cache
        state: directory
        owner: foreman
        group: foreman
        mode: '0755'

    - name: Nuke apipie cache directory
      ansible.builtin.file:
        path: /usr/share/foreman/public/apipie-cache
        state: absent

    - name: Recreate apipie cache directory
      ansible.builtin.file:
        path: /usr/share/foreman/public/apipie-cache
        state: directory
        owner: foreman
        group: foreman
        mode: '0755'

    - name: Rebuild apipie cache
      ansible.builtin.command: foreman-rake apipie:cache:index

    # FIX: Wait for the Foreman API to be healthy before declaring success.
    - name: Wait for Foreman API to become healthy
      ansible.builtin.uri:
        url: "https://foreman.homelab.com/api/v2/hosts"
        method: GET
        validate_certs: no
        status_code: 200
      register: api_check
      retries: 10
      delay: 30
      until: api_check.status == 200
  tags:
    - restore