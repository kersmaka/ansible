---
- name: Verify OS is RHEL/Rocky/AlmaLinux 9
  ansible.builtin.assert:
    that:
      - ansible_distribution_major_version == "9"
    fail_msg: "This playbook requires EL9. Found: {{ ansible_distribution }} {{ ansible_distribution_major_version }}"
    success_msg: "OS check passed: {{ ansible_distribution }} {{ ansible_distribution_major_version }}"
  tags:
    - preflight
    - always

- name: Import Puppet 8 GPG key
  ansible.builtin.rpm_key:
    key: "{{ puppet_gpg_key }}"
    state: present
  tags:
    - puppet
    - repos

- name: Install Puppet 8 release RPM
  ansible.builtin.dnf:
    name: "{{ puppet_release_rpm }}"
    state: present
    disable_gpg_check: false
  tags:
    - puppet
    - repos

- name: Import Foreman 3.17 GPG key
  ansible.builtin.rpm_key:
    key: "{{ foreman_gpg_key }}"
    state: present
  tags:
    - foreman
    - repos

- name: Install Foreman 3.17 release RPM
  ansible.builtin.dnf:
    name: "{{ foreman_release_rpm }}"
    state: present
    disable_gpg_check: false
  tags:
    - foreman
    - repos

- name: Install foreman-installer
  ansible.builtin.dnf:
    name: "{{ foreman_installer_package }}"
    state: present
  tags:
    - foreman
    - install
  notify: Confirm foreman-installer version

- name: Get primary IPv4 address
  ansible.builtin.set_fact:
    foreman_ip: "{{ ansible_default_ipv4.address }}"
  tags:
    - preflight
    - networking

- name: Ensure foreman.homelab.com is in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '.*foreman\.homelab\.com.*'
    line: "{{ foreman_ip }}\tforeman.homelab.com foreman"
    state: present
    backup: yes
  tags:
    - preflight
    - networking

- name: Run foreman-installer
  ansible.builtin.command:
    cmd: foreman-installer
    creates: /etc/foreman/settings.yaml
  tags:
    - foreman
    - install    

- name: Ensure rsync is installed on kvm_host
  ansible.builtin.package:
    name: rsync
    state: present
  delegate_to: kvm_host
  tags:
    - foreman
    - restore

- name: Copy Katello backup from kvm_host to foreman VM
  ansible.builtin.synchronize:
    src: "/home/temp/{{ katello_backup_file }}"
    dest: "/tmp/{{ katello_backup_file }}"
    mode: push
    dest_port: 22
  delegate_to: kvm_host
  tags:
    - foreman
    - restore

- name: Ensure /home/temp directory exists
  ansible.builtin.file:
    path: /home/temp
    state: directory
    mode: '0755'
  tags:
    - foreman
    - restore    

- name: Extract Katello backup archive to /home/temp
  ansible.builtin.unarchive:
    src: "/tmp/{{ katello_backup_file }}"
    dest: /home/temp/
    remote_src: yes 

- name: Install rubygem-foreman_maintain
  ansible.builtin.dnf:
    name: rubygem-foreman_maintain
    state: present
  tags:
    - foreman
    - install

- name: Set hostname to foreman.homelab.com
  ansible.builtin.hostname:
    name: foreman.homelab.com
  tags:
    - preflight
    - networking    

- name: Enable Satellite repositories via subscription-manager
  ansible.builtin.command:
    cmd: >-
      subscription-manager repos
      --enable=satellite-6.16-for-rhel-9-x86_64-rpms
      --enable=satellite-maintenance-6.16-for-rhel-9-x86_64-rpms
      --enable=satellite-client-6-for-rhel-9-x86_64-rpms
  tags:
    - foreman
    - repos

- name: Drop existing databases to ensure clean restore
  ansible.builtin.shell: |
    sudo -u postgres dropdb {{ item }} || true
  loop:
    - candlepin
    - foreman
    - pulpcore
  tags:
    - foreman
    - restore

- name: Restore Katello backup via foreman-maintain
  ansible.builtin.command:
    cmd: >-
      foreman-maintain restore /home/temp/{{ katello_backup_dir }}
      --assumeyes
      --whitelist=restore-candlepin-dump,restore-foreman-dump,restore-drop-databases,pulpcore-db-up,restore-installer-reset,restore-validate-hostname,restore-validate-backup,restore-validate-interfaces,candlepin-db-up,foreman-db-up,installer-run
  tags:
    - foreman
    - restore

- name: Clean DNF metadata and refresh subscriptions
  ansible.builtin.shell: |
    subscription-manager refresh
    dnf clean all
    dnf makecache
  tags:
    - foreman
    - restore

- name: Fix interface names in foreman-installer answers
  ansible.builtin.replace:
    path: /etc/foreman-installer/scenarios.d/katello-answers.yaml
    regexp: '(interface|dns_interface|dhcp_interface):.*'
    replace: '\1: {{ ansible_default_ipv4.interface }}'
  tags:
    - foreman
    - restore

- name: Run foreman-installer post-restore
  ansible.builtin.command:
    cmd: >-
      foreman-installer 
      --foreman-proxy-dhcp-interface={{ ansible_default_ipv4.interface }}
      --foreman-proxy-dns-interface={{ ansible_default_ipv4.interface }}
  register: foreman_installer_result
  # Sometimes the first run after a restore fixes dependencies but exits with a minor error; 
  # however, here we want to ensure it succeeds.
  failed_when: foreman_installer_result.rc != 0
  tags:
    - foreman
    - restore