---
- name: Try to load a module from the mysql collection
  block:
    - name: Dynamically check if the mysql module can be loaded
      ansible.builtin.validate_argument_spec:
        argument_spec: {}
        provided_arguments: {}
        module_to_validate: ansible.mysql.mysql_info  # <-- Fixed indentation
      register: mysql_test_output

  rescue:
    - name: Analyze the failure type
      ansible.builtin.debug:
        msg: >
          {% if ansible_failed_result is defined and ('could not be found' in ansible_failed_result.msg or 'not found' in ansible_failed_result.msg) %}
            CRITICAL FAILURE: The ansible.mysql collection cannot be found 
            by your current environment execution path.
          {% else %}
            SUCCESS: The collection is installed and working!
          {% endif %}

    - name: Print raw error message for confirmation
      ansible.builtin.debug:
        var: ansible_failed_result