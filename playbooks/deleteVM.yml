---
- name: Remove KVM Virtual Machine
  hosts: kvm_host
  become: true
  vars:
    image_path: "/home/ansible_admin/vms/qcow2/{{ vm_name }}.qcow2"

  tasks:
    - name: Ensure VM is stopped
      community.libvirt.virt:
        name: "{{ vm_name }}"
        state: destroyed
      failed_when: false # Ignore if already stopped

    - name: Undefine VM and cleanup snapshots/storage
      ansible.builtin.command: >
        virsh undefine {{ vm_name }} 
        --remove-all-storage 
        --snapshots-metadata 
        --nvram
      register: undefine_out
      failed_when:
        - undefine_out.rc != 0
        - "'domain not found' not in undefine_out.stderr"

    - name: Ensure qcow2 file is deleted (fallback)
      ansible.builtin.file:
        path: "{{ image_path }}"
        state: absent